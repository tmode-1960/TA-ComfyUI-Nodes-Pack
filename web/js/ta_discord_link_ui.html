<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TA Discord Link — Editor</title>
  <style>
    :root {
      --bg:       #1e1e2e;
      --surface:  #2a2a3e;
      --border:   #3a3a5a;
      --accent:   #5865F2;
      --accent-h: #4752C4;
      --text:     #cdd6f4;
      --muted:    #7f849c;
      --success:  #a6e3a1;
      --error:    #f38ba8;
      --radius:   8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'gg sans', 'Noto Sans', sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      padding: 28px 32px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .header svg { flex-shrink: 0; }
    .header h1  { font-size: 18px; font-weight: 700; }
    .header p   { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Form ── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    input[type="text"], input[type="url"] {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }

    .field { margin-bottom: 18px; }
    .hint  { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* ── Preview ── */
    .preview-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 8px;
    }
    .preview-wrap {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      margin-bottom: 22px;
    }
    #preview-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 8px 14px;
      background: var(--accent);
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    #preview-btn:hover { background: var(--accent-h); }

    /* ── Save button ── */
    #save-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #save-btn:hover    { background: var(--accent-h); }
    #save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ── */
    #toast {
      margin-top: 14px;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    #toast.ok  { background: #1e3a2f; color: var(--success); border: 1px solid var(--success); }
    #toast.err { background: #3a1e26; color: var(--error);   border: 1px solid var(--error);   }

    /* ── Discord logo SVG ── */
    .discord-icon {
      margin-right: 7px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="#5865F2">
      <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
    </svg>
    <div>
      <h1>TA Discord Link</h1>
      <p>thomo.ART Node Pack — Link Editor</p>
    </div>
  </div>

  <!-- URL field -->
  <div class="field">
    <label for="url-input">Discord Invite URL</label>
    <input type="url" id="url-input" placeholder="https://discord.gg/…" spellcheck="false" autocomplete="off">
    <p class="hint">Your Discord invite link — e.g. https://discord.gg/abcXYZ123</p>
  </div>

  <!-- Label field -->
  <div class="field">
    <label for="label-input">Button Label</label>
    <input type="text" id="label-input" placeholder="Join us on Discord" maxlength="60">
    <p class="hint">Text shown on the button inside the ComfyUI node.</p>
  </div>

  <!-- Live preview -->
  <div class="preview-label">Preview</div>
  <div class="preview-wrap">
    <a id="preview-btn" href="#" target="_blank" rel="noopener noreferrer">
      <svg class="discord-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="white">
        <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
      </svg>
      <span id="preview-label-text">Join us on Discord</span>
    </a>
  </div>

  <!-- Save -->
  <button id="save-btn">Save</button>
  <div id="toast"></div>

</div>

<script>
  const urlInput   = document.getElementById("url-input");
  const labelInput = document.getElementById("label-input");
  const previewBtn = document.getElementById("preview-btn");
  const previewTxt = document.getElementById("preview-label-text");
  const saveBtn    = document.getElementById("save-btn");
  const toast      = document.getElementById("toast");

  // ── Live preview sync ──────────────────────────────────────────────────────
  urlInput.addEventListener("input",   () => { previewBtn.href = urlInput.value || "#"; });
  labelInput.addEventListener("input", () => { previewTxt.textContent = labelInput.value || "Join us on Discord"; });

  // ── Load current config ────────────────────────────────────────────────────
  async function loadConfig() {
    try {
      const res  = await fetch("/ta_discord_link/config");
      const data = await res.json();
      urlInput.value   = data.discord_url ?? "";
      labelInput.value = data.label       ?? "";
      previewBtn.href  = data.discord_url ?? "#";
      previewTxt.textContent = data.label ?? "Join us on Discord";
    } catch (e) {
      showToast("Could not load current config.", false);
    }
  }

  // ── Save ───────────────────────────────────────────────────────────────────
  saveBtn.addEventListener("click", async () => {
    const url   = urlInput.value.trim();
    const label = labelInput.value.trim();

    if (!url) {
      showToast("Please enter a Discord invite URL.", false);
      return;
    }

    saveBtn.disabled = true;
    try {
      const res  = await fetch("/ta_discord_link/save", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ discord_url: url, label }),
      });
      const data = await res.json();
      if (data.ok) {
        showToast("✓ Saved! Reload ComfyUI to update the node button.", true);
      } else {
        showToast("Error: " + (data.error ?? "Unknown error"), false);
      }
    } catch (e) {
      showToast("Save failed: " + e.message, false);
    } finally {
      saveBtn.disabled = false;
    }
  });

  function showToast(msg, ok) {
    toast.textContent = msg;
    toast.className   = ok ? "ok" : "err";
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 4000);
  }

  loadConfig();
</script>
</body>
</html>
